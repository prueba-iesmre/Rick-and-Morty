<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RICK Y MORTY</title>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="">
</head>

<body>
  <header class="main-header space-bg">
    <div class="header-content">
      <img src="img/Portal-Nave.png" class="header-img left" alt="Portal nave">
      <h1>
        <a href="index.html" class="header-link">
          <span class="t-green">Rick</span>
          <span class="t-and">&</span>
          <span class="t-cyan">Morty</span>
        </a>
      </h1>
      <img src="img/Pepinillo.png" class="header-img right" alt="Pepinillo">
    </div>
  </header>

  <main>
    <div class="contenedor-navbar">
      <a href="index.html">Inicio</a>
      <a href="https://rickandmortyapi.com/" target="_blank">API</a>
      <a href="Sobre_Nosotros.html" target="_blank">Sobre Nosotros</a>
      <a href="Aviso_legal.html" target="_blank">Aviso Legal</a>
      <a href="https://docs.google.com/document/d/1Ln-msqPSI5VURYl2V_Jo3vwCTMTNQOKzFCKvynF537g/edit?usp=sharing" target="_blank">Documentación</a>
    </div>

    <section class="bloque-busqueda">
      <form id="formBusqueda" class="form-busqueda">
        <fieldset class="fieldset-busqueda">
          <legend class="tituloOpciones">Búsqueda</legend>

          <div class="fila-principal-busqueda">
            <div class="campo-busqueda campo-grande">
              <label for="searchInput">Buscar</label>
              <input type="text" id="searchInput" placeholder="Escribe para buscar...">
            </div>

            <div class="campo-busqueda">
              <label for="filterType">Tipo</label>
              <select id="filterType">
                <option value="character">Personajes</option>
                <option value="location">Ubicaciones</option>
                <option value="episode">Episodios</option>
              </select>
            </div>

            <div class="campo-busqueda campo-boton-vista">
              <label>&nbsp;</label>
              <button type="button" id="cambiar_ficha" onclick="cambiarVista()" aria-label="Cambiar vista">
                <svg id="svgGrid" class="icono" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
                  <path d="M3 1H1V3H3V1Z"/>
                  <path d="M3 5H1V7H3V5Z"/>
                  <path d="M1 9H3V11H1V9Z"/>
                  <path d="M3 13H1V15H3V13Z"/>
                  <path d="M15 1H5V3H15V1Z"/>
                  <path d="M15 5H5V7H15V5Z"/>
                  <path d="M5 9H15V11H5V9Z"/>
                  <path d="M15 13H5V15H15V13Z"/>
                </svg>

                <svg id="svgList" class="icono oculto" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                  <path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/>
                </svg>
              </button>
            </div>
          </div>

          <div id="opciones-character" class="opciones-dinamicas">
            <h3 class="subtitulo-opciones">Opciones de personajes</h3>
            <div class="grupo-campos">
              <div class="campo-busqueda">
                <label for="estadoSelect">Estado</label>
                <div id="estado"></div>
              </div>

              <div class="campo-busqueda">
                <label for="especieSelect">Especie</label>
                <div id="especie"></div>
              </div>

              <div class="campo-busqueda">
                <label for="tipoCSelect">Tipo</label>
                <div id="tipoC"></div>
              </div>

              <div class="campo-busqueda">
                <label for="generoSelect">Género</label>
                <div id="genero"></div>
              </div>
            </div>
          </div>

          <div id="opciones-location" class="opciones-dinamicas oculto">
            <h3 class="subtitulo-opciones">Opciones de ubicación</h3>
            <div class="grupo-campos">
              <div class="campo-busqueda">
                <label for="tipoLSelect">Tipo</label>
                <div id="tipoL"></div>
              </div>

              <div class="campo-busqueda">
                <label for="dimensionSelect">Dimensión</label>
                <div id="dimension"></div>
              </div>
            </div>
          </div>

          <div id="opciones-episode" class="opciones-dinamicas oculto">
            <h3 class="subtitulo-opciones">Opciones de episodios</h3>
            <div class="grupo-campos">
              <div class="campo-busqueda">
                <label for="episodioSelect">Episodio</label>
                <div id="episodio"></div>
              </div>
            </div>
          </div>

        </fieldset>
      </form>
    </section>

    <div id="contenedor" class="contenedor"></div>

    <div id="numerosPaginacion" class="numerosPaginacion"></div>

    <div class="botonesPaginacion">
      <button class="btn-icono" onclick="paginaAnterior()" aria-label="Página anterior">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 16 16">
          <path d="M8 10L8 14L6 14L0 8L6 2L8 2L8 6L16 6L16 10L8 10Z"/>
        </svg>
      </button>

      <button class="btn-icono" onclick="paginaSiguiente()" aria-label="Página siguiente">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 16 16">
          <path d="M8 6L8 2L10 2L16 8L10 14L8 14L8 10L0 10L0 6L8 6Z"/>
        </svg>
      </button>
    </div>
  </main>

  <footer class="piedepagina">
    <ul class="redes">
      <li>
        <a href="https://github.com/prueba-iesmre/Rick-and-Morty" target="_blank">
          <img src="img/github.png" alt="Github">
        </a>
      </li>
      <li>
        <a href="https://www.instagram.com/rickandmorty/" target="_blank">
          <img src="img/instagram.png" alt="Instagram">
        </a>
      </li>
      <li>
        <a href="https://rickandmortyapi.com/" target="_blank">
          <img src="img/api.png" alt="Rick and Morty API">
        </a>
      </li>
      <li>
        <a href="#">
          <img src="img/about.png" alt="About us">
        </a>
      </li>
    </ul>
    <p>© 2026 Multiverse Web Page | Inspired by Rick & Morty</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
